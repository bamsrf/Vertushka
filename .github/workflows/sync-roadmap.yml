name: Sync ROADMAP

# Запускается на каждый merged PR в main → дописывает запись в
# Вертушка/ROADMAP.md и открывает sync-PR с обновлением.
#
# Также можно запустить руками через workflow_dispatch (полная пересинхронизация
# с указанной даты), если автомат пропустил что-то.

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      since:
        description: "Re-sync all merged PRs since this date (YYYY-MM-DD)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    # Для pull_request — только если PR действительно смерджен (не просто закрыт).
    # Для workflow_dispatch — всегда.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sync_roadmap (single PR)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: python Вертушка/scripts/sync_roadmap.py --from-event "$GITHUB_EVENT_PATH"

      - name: Run sync_roadmap (re-sync since date)
        if: github.event_name == 'workflow_dispatch' && inputs.since != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python Вертушка/scripts/sync_roadmap.py --since "${{ inputs.since }}"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- "Вертушка/ROADMAP.md"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open sync PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(roadmap): sync changelog"
          title: "chore(roadmap): sync changelog"
          body: |
            Auto-generated by `.github/workflows/sync-roadmap.yml`.

            Triggered by: ${{ github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || 'workflow_dispatch' }}

            See `Вертушка/scripts/sync_roadmap.py` for the mapping of conventional-commit scopes to milestones.
          branch: chore/roadmap-sync
          delete-branch: true
          base: main
